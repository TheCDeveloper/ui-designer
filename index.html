<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ui Designer</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/view-design.css">
    <link rel="stylesheet" href="styles/view-code.css">
</head>
<body>
    <div class="viewport">
        <div class="tabs">
            <button id="tab-design" class="selected">Design</button>
            <button id="tab-code">Code</button>
        </div>
        <div class="views">
            <div id="view-design" class="selected">
                <div id="canvas"></div>
            </div>
            <div id="view-code">
                <div id="code-canvas"></div>
                <div id="block-category-bar">
                    <button id="btn-category-event" class="selected">Events</button>
                </div>
                <div id="blocks-list"></div>
            </div>
        </div>
    </div>
</body>
<script src="scripts/view.js"></script>
<script src="scripts/canvas.js"></script>
</html>
